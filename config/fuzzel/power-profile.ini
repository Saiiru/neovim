[main]
font=JetBrains Mono:size=14,Noto Sans Mono CJK TC:size=14
line-height=28
prompt=""
placeholder="power profile ..."
terminal="kitty -e"
icon-theme=Papirus-Dark
icons-enabled=yes
horizontal-pad=60
vertical-pad=30
inner-pad=10
image-size-ratio=0.3
lines=10
width=50
letter-spacing=0.5
[border]
radius=10
width=2
[colors]
background = "#182132f2"       # Background color
text = "#d7e2f0ff"             # Text (foreground) color of unselected entries
prompt = "#d7e2f0ff"           # Text (foreground) color of prompt character(s)
input = "#d7e2f0ff"            # Text (foreground) color of input string
match = "#2ac3ffff"            # Text (foreground) color of the matched substring
selection = "#22304aff"        # Background color of the selected entry
selection-text = "#f2f7ffff"   # Text (foreground) color of the selected entry
selection-match = "#56d4ddff"  # Text (foreground) color of the matched substring of the selected entry
border = "#a77dffdd"           # The color of the match count stats printed at the right-hand side of the input prompt
