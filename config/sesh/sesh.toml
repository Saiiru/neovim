#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

blacklist = ["_popup_", "scratch"]
dir_length = 2
cache = true

sort_order = [
  "tmux",
  "config",
  "zoxide",
]

preview_command = "eza --all --git --icons --color=always {}"

[tui]
prompt = "󰭟 "
placeholder = "Switch or create session..."
show_icons = true

[default_session]
startup_command = "nvim"

[[session]]
name = "dotfiles"
path = "~/dotfiles"
startup_command = "nvim"

[[session]]
name = "workspace"
path = "~/workspace"

[[session]]
name = "workstation"
path = "~/workstation"
startup_command = "nvim"
