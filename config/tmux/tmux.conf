# ══════════════════════════════════════════════════════════════════════════════
#  ~/.config/tmux/tmux.conf
#  Batman 2022 · Industrial Noir · tpipeline-ready
#  tmux is the host; Neovim takes over the statusline when active.
# ══════════════════════════════════════════════════════════════════════════════

# ── Shell ─────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh

# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -g xterm-keys on
set -as terminal-overrides ",xterm-kitty:Tc"
set -as terminal-overrides ",tmux-256color:Tc"
set -as terminal-features ",xterm-256color:RGB:usstyle:extkeys:sync"
set -as terminal-features ",tmux-256color:RGB:usstyle:extkeys:sync"

# ── General ───────────────────────────────────────────────────────────────────
set -g set-clipboard      on
set -g detach-on-destroy  no-detached
set -g remain-on-exit     off
set -g escape-time        0
set -g history-limit      50000
set -g mouse              on
set -g allow-passthrough  on
set -g set-titles         on
set -g set-titles-string  "#{pane_title}"
set -g focus-events       on
set -g extended-keys      on
set -g status-interval    15

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload ────────────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  reloaded"

# ── Sessions / sesh ───────────────────────────────────────────────────────────
bind o run-shell "~/.config/tmux/scripts/tmux-session-actions.sh --inline"
bind w run-shell "~/.config/tmux/scripts/tmux-session-actions.sh --inline"
bind W run-shell "~/.config/tmux/scripts/tmux-session-actions.sh --inline"

# ── Windows ───────────────────────────────────────────────────────────────────
set -g base-index          1
set -g pane-base-index     1
set -g renumber-windows    on
set -g automatic-rename    on
set -g automatic-rename-format "#{b:pane_current_path}"

unbind c
bind c new-window  -a -c "#{pane_current_path}"
bind C new-session
bind , last-window
bind ß move-window -r
bind -r S-Left  run 'tmux swap-window -d -t #{e|-|:#I,1}'
bind -r S-Right run 'tmux swap-window -d -t #{e|+|:#I,1}'
bind t choose-window  -Z
bind T display-popup -E -w 80% -h 70% "sesh connect \"$(
  sesh list --icons | fzf --ansi --no-sort \
    --border-label=' sesh ' \
    --prompt='session › ' \
    --header='enter connect | ctrl-t tmux | ctrl-z zoxide | ctrl-f find' \
    --bind='ctrl-t:change-prompt(tmux › )+reload(sesh list -t --icons)' \
    --bind='ctrl-z:change-prompt(zoxide › )+reload(sesh list -z --icons)' \
    --bind='ctrl-f:change-prompt(find › )+reload(fd -t d . ~/workspace ~/Projects 2>/dev/null)' \
)\""
bind P attach-session -t . -c '#{pane_current_path}'

# ── Splits ────────────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Panes ─────────────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h resize-pane -L
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R
bind -r m   resize-pane -Z
bind s      swap-pane \; select-pane -M
bind S      join-pane

# ── Copy mode ─────────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
set-window-option -g status-keys vi

bind K copy-mode \; send -X previous-prompt -o
bind J copy-mode \; send -X next-prompt -o
bind v copy-mode
bind p paste-buffer

bind-key -T copy-mode-vi v     send -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel \
  "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection c -in || pbcopy'"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \
  "sh -c 'command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection c -in || pbcopy'"
bind-key -T copy-mode-vi /     command-prompt -i -p "search ↓" \
  "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ?     command-prompt -i -p "search ↑" \
  "send -X search-backward-incremental \"%%%\""
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Popups ────────────────────────────────────────────────────────────────────
bind g display-popup -E -w 92% -h 92% -d "#{pane_current_path}" "lazygit"
bind y display-popup -E -w 92% -h 92% -d "#{pane_current_path}" "yazi"
bind b display-popup -E -w 92% -h 92% -d "#{pane_current_path}" "btop"
bind n display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "nmtui"
bind E display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "zsh -lc 'esp build; read -k1'"
bind F display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "zsh -lc 'esp fm'"
bind M display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "zsh -lc 'esp monitor'"

# ── Colours (Noctis Circuit) ──────────────────────────────────────────────────
source-file ~/.config/tmux/theme-noctis-circuit.conf

BG="#0A0E14"
PANEL="#0D1117"
BORDER="#1E2D40"
FG="#D7E2F0"
MUTED="#7C8DA6"
BLUE="#2AC3FF"
CYAN="#56D4DD"
VIOLET="#A77DFF"
YELLOW="#FFD000"
RED="#FF3B5C"
ORANGE="#FF8F40"
GREEN="#39FF14"
GITHUB="#C9D1D9"

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=${BORDER}"
set -g pane-active-border-style "fg=${BLUE}"
set -g pane-border-status       off
set -g pane-border-format       ""

# ── Messages ──────────────────────────────────────────────────────────────────
set -g message-style         "bg=${BLUE},fg=${BG},bold"
set -g message-command-style "bg=${YELLOW},fg=${BG},bold"
set -g mode-style            "bg=${VIOLET},fg=${BG},bold"

# ══════════════════════════════════════════════════════════════════════════════
#  STATUSLINE
#  Design: flat, no pills, no powerline.  Typography carries hierarchy.
#  Left   → one session label + optional nvim bridge
#  Centre → window list
#  Right  → path + git + host + optional nvim bridge-R
# ══════════════════════════════════════════════════════════════════════════════

set -g status                on
set -g status-position       bottom
set -g status-style          "bg=default,fg=${MUTED}"
set -g status-justify        absolute-centre
set -g status-left-length    240
set -g status-right-length   240
set -g window-status-separator  ""

# tpipeline bridge safe-read
set -g @kora_tpipeline_left  "sh -c 'cat \"#{socket_path}-#{session_id}-vimbridge\" 2>/dev/null || true'"
set -g @kora_tpipeline_right "sh -c 'cat \"#{socket_path}-#{session_id}-vimbridge-R\" 2>/dev/null || true'"

# ── Left: session name + nvim bridge slot ─────────────────────────────────────
#  When nvim is active, tpipeline writes into the vimbridge file and fills this.
set -g status-left "\
#[fg=${PANEL},bg=default]\
#[bg=${PANEL},fg=${RED},bold] 󰭟 \
#[fg=${BLUE},bold]#($HOME/.config/tmux/scripts/status-session.sh)\
#[fg=${BORDER}] │ \
#(#{@kora_tpipeline_left})\
"

# ── Window: inactive ──────────────────────────────────────────────────────────
#  Muted number · dim name · gap
set -g window-status-format "\
#[fg=${BORDER}]  \
#[fg=${MUTED}]#I\
#[fg=${BORDER}]·\
#[fg=${MUTED}]#W  \
"

# ── Window: active ────────────────────────────────────────────────────────────
#  Blue number, bright name, zoom badge
set -g window-status-current-format "\
#[fg=${BORDER}]  \
#[fg=${BLUE},bold]#I\
#[fg=${BORDER}] \
#[fg=${FG},bold]#W\
#{?window_zoomed_flag,#[fg=${YELLOW}] 󰁌,}\
  \
"

set -g window-status-activity-style "fg=${YELLOW},bold"
set -g window-status-bell-style     "fg=${RED},bold"

# ── Right: path + git + host + nvim bridge-R ─────────────────────────────────
set -g status-right "\
#(#{@kora_tpipeline_right})\
#[fg=${BORDER},bg=default] │ \
#[fg=${BLUE},bold]#($HOME/.config/tmux/scripts/status-pane-path.sh '#{pane_current_path}')\
#[fg=${GITHUB}]#($HOME/.config/tmux/scripts/status-git.sh '#{pane_current_path}') \
#[fg=${BORDER}] │ \
#[fg=${MUTED}]#{host_short}\
#[fg=${PANEL}] \
"

# ══════════════════════════════════════════════════════════════════════════════
#  PLUGINS (TPM)
# ══════════════════════════════════════════════════════════════════════════════

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="  URL › " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @resurrect-strategy-nvim  'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore         'on'

run '~/.tmux/plugins/tpm/tpm'
