[manager]
cwd = { fg = "#2AC3FF", bold = true }

hovered = { fg = "#F2F7FF", bg = "#182132", bold = true }
preview_hovered = { fg = "#F2F7FF", bg = "#182132", bold = true }

find_keyword = { fg = "#0A0E14", bg = "#FFD000", bold = true }
find_position = { fg = "#FFD000", bold = true }

marker_copied = { fg = "#39FF14", bg = "#39FF14" }
marker_cut = { fg = "#FF3B5C", bg = "#FF3B5C" }
marker_marked = { fg = "#A77DFF", bg = "#A77DFF" }
marker_selected = { fg = "#2AC3FF", bg = "#2AC3FF" }

tab_active = { fg = "#0A0E14", bg = "#2AC3FF", bold = true }
tab_inactive = { fg = "#98A9C2", bg = "#111826" }
tab_width = 1

count_copied = { fg = "#0A0E14", bg = "#39FF14" }
count_cut = { fg = "#0A0E14", bg = "#FF3B5C" }
count_selected = { fg = "#0A0E14", bg = "#A77DFF" }

border_symbol = "│"
border_style = { fg = "#22304A" }

syntect_theme = ""

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#22304A", bg = "#0A0E14" }

progress_label = { fg = "#F2F7FF", bold = true }
progress_normal = { fg = "#2AC3FF", bg = "#111826" }
progress_error = { fg = "#FF3B5C", bg = "#111826" }

perm_type = { fg = "#2AC3FF" }
perm_read = { fg = "#39FF14" }
perm_write = { fg = "#FFD000" }
perm_exec = { fg = "#FF3B5C" }
perm_sep = { fg = "#7C8DA6" }

[input]
border = { fg = "#A77DFF" }
title = { fg = "#F2F7FF", bold = true }
value = { fg = "#D7E2F0" }
selected = { fg = "#0A0E14", bg = "#2AC3FF", bold = true }

[select]
border = { fg = "#2AC3FF" }
active = { fg = "#F2F7FF", bg = "#182132", bold = true }
inactive = { fg = "#98A9C2" }

[tasks]
border = { fg = "#22304A" }
title = { fg = "#F2F7FF", bold = true }
hovered = { fg = "#F2F7FF", bg = "#182132" }

[which]
cols = 3
mask = { bg = "#0A0E14" }
cand = { fg = "#2AC3FF", bold = true }
rest = { fg = "#98A9C2" }
desc = { fg = "#F2F7FF" }
separator = " 󰅂 "
separator_style = { fg = "#22304A" }

[help]
on = { fg = "#2AC3FF", bold = true }
run = { fg = "#F2F7FF" }
desc = { fg = "#98A9C2" }
hovered = { bg = "#182132", bold = true }
footer = { fg = "#A77DFF", bg = "#111826", bold = true }

[filetype]
rules = [
  { name = "*/", fg = "#2AC3FF" },

  { mime = "image/*", fg = "#A77DFF" },
  { mime = "video/*", fg = "#FF3B5C" },
  { mime = "audio/*", fg = "#39FF14" },
  { mime = "application/pdf", fg = "#FF3B5C" },

  { name = "*.md", fg = "#F2F7FF" },
  { name = "*.txt", fg = "#D7E2F0" },

  { name = "*.json", fg = "#FFD000" },
  { name = "*.toml", fg = "#FFD000" },
  { name = "*.yaml", fg = "#FFD000" },
  { name = "*.yml", fg = "#FFD000" },

  { name = "*.lua", fg = "#A77DFF" },
  { name = "*.sh", fg = "#39FF14" },
  { name = "*.zsh", fg = "#39FF14" },

  { name = "*.rs", fg = "#FF3B5C" },
  { name = "*.go", fg = "#2AC3FF" },
  { name = "*.java", fg = "#FF3B5C" },
  { name = "*.ts", fg = "#2AC3FF" },
  { name = "*.tsx", fg = "#2AC3FF" },
  { name = "*.js", fg = "#FFD000" },

  { name = "*.zip", fg = "#FFD000" },
  { name = "*.tar", fg = "#FFD000" },
  { name = "*.gz", fg = "#FFD000" },
  { name = "*.xz", fg = "#FFD000" },
  { name = "*.7z", fg = "#FFD000" },
]
