palette = "noctis_circuit"
add_newline = false
command_timeout = 800
scan_timeout = 30
continuation_prompt = "[╎](muted) "

format = """
[┌─\\(](blue)${custom.identity}[\\)](blue)[-](muted)${custom.dir_block}${custom.git_block}$python$nodejs$deno$bun$rust$golang$java$kotlin$lua$php$ruby$swift$dart$elixir$haskell$zig$c$cmake$docker_context$terraform$package$cmd_duration
[└─](blue)$character"""

[palettes.noctis_circuit]
bg     = "#0A0E14"
panel  = "#0D1117"
surface= "#111826"
border = "#1E2D40"
fg     = "#D7E2F0"
muted  = "#7890AA"
cyan   = "#2AC3FF"
violet = "#A77DFF"
yellow = "#FFD000"
red    = "#FF3B5C"
green  = "#39FF14"
github = "#C9D1D9"

# ── Identity ─────────────────────────────────────────────────────────────────
[custom.identity]
when = "true"
shell = ["bash", "--noprofile", "--norc"]
command = '''
host="${HOSTNAME:-$(hostname)}"
printf "%s 󰭟 %s" "$USER" "${host%%.*}"
'''
style = "bold fg"
format = "[$output]($style)"

# ── Directory ────────────────────────────────────────────────────────────────
[custom.dir_block]
when = "true"
shell = ["bash", "--noprofile", "--norc"]
command = '''
shorten_path() {
  local path="$1"
  local IFS='/'
  local -a parts
  local out=""
  local idx=0
  read -ra parts <<< "$path"

  for part in "${parts[@]}"; do
    [[ -z "$part" ]] && continue
    idx=$((idx + 1))
    if (( idx < ${#parts[@]} )); then
      out+="${part:0:1}/"
    else
      out+="$part"
    fi
  done

  printf "%s" "$out"
}

if [[ "$PWD" == "$HOME" ]]; then
  printf "[󱂵 ~]"
  exit 0
fi

if git_root="$(git rev-parse --show-toplevel 2>/dev/null)"; then
  repo="$(basename "$git_root")"
  rel="${PWD#$git_root/}"

  if [[ "$PWD" == "$git_root" || "$rel" == "$PWD" || -z "$rel" ]]; then
    printf "[ %s]" "$repo"
  else
    printf "[ %s/%s]" "$repo" "$(shorten_path "$rel")"
  fi
else
  base="$(basename "$PWD")"
  parent="$(basename "$(dirname "$PWD")")"

  if [[ "$parent" == "$(basename "$HOME")" || "$parent" == "/" || "$parent" == "." ]]; then
    printf "[ %s]" "$base"
  else
    printf "[ %s/%s]" "$parent" "$base"
  fi
fi
'''
style = "bold blue"
format = "[$output]($style)"

# ── Git ──────────────────────────────────────────────────────────────────────
[custom.git_block]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
shell = ["bash", "--noprofile", "--norc"]
command = '''
branch="$(
  git symbolic-ref --quiet --short HEAD 2>/dev/null \
    || printf "detached@%s" "$(git rev-parse --short HEAD 2>/dev/null)"
)"

ahead=0
behind=0
if ab="$(git rev-list --left-right --count @{upstream}...HEAD 2>/dev/null)"; then
  behind="${ab%% *}"
  ahead="${ab##* }"
fi

conflicted=0
untracked=0
modified=0
staged=0
renamed=0
deleted=0

while IFS= read -r line; do
  [[ -z "$line" ]] && continue

  xy="${line:0:2}"
  idx="${xy:0:1}"
  wt="${xy:1:1}"

  case "$xy" in
    "??") untracked=1; continue ;;
    "UU"|"AA"|"DD"|"AU"|"UD"|"UA"|"DU") conflicted=1; continue ;;
  esac

  [[ "$idx" == "R" || "$wt" == "R" ]] && renamed=1
  [[ "$idx" == "D" || "$wt" == "D" ]] && deleted=1

  [[ "$idx" != " " && "$idx" != "?" ]] && staged=1
  [[ "$wt"  != " " && "$wt"  != "?" ]] && modified=1
done < <(git status --porcelain=v1 --ignore-submodules=dirty 2>/dev/null)

stash="$(git stash list 2>/dev/null | wc -l | tr -d ' ')"

flags=""
(( ahead      > 0 )) && flags+=" ↑${ahead}"
(( behind     > 0 )) && flags+=" ↓${behind}"
(( conflicted == 1 )) && flags+=" !"
(( staged     == 1 )) && flags+=" +"
(( modified   == 1 )) && flags+=" ~"
(( renamed    == 1 )) && flags+=" »"
(( deleted    == 1 )) && flags+=" x"
(( untracked  == 1 )) && flags+=" ?"
(( stash      > 0 )) && flags+=" *${stash}"

if [[ -n "$flags" ]]; then
  printf "[ %s |%s]" "$branch" "$flags"
else
  printf "[ %s]" "$branch"
fi
'''
style = "bold violet"
format = "[-](muted)[$output]($style)"

