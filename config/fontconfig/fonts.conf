<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Space Grotesk</family>
      <family>Inter</family>
      <family>Noto Sans</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Monaspace Neon NF</family>
      <family>Monaspace Neon</family>
      <family>Maple Mono NF</family>
      <family>IosevkaTerm Nerd Font</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Monaspace Neon NF</family>
    <prefer>
      <family>MonaspiceNe Nerd Font</family>
      <family>MonaspiceNe NF</family>
      <family>Monaspace Neon</family>
      <family>Maple Mono NF</family>
      <family>IosevkaTerm Nerd Font</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Monaspace Neon</family>
    <prefer>
      <family>Monaspace Neon</family>
      <family>MonaspiceNe Nerd Font</family>
      <family>MonaspiceNe NF</family>
      <family>Maple Mono NF</family>
      <family>IosevkaTerm Nerd Font</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>Maple Mono NF</family>
    <prefer>
      <family>Maple Mono NF</family>
      <family>IosevkaTerm Nerd Font</family>
      <family>JetBrainsMono Nerd Font</family>
      <family>JetBrains Mono</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
